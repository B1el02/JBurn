<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1d24" />
      <stop offset="100%" stop-color="#0d0e12" />
    </radialGradient>

    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" />
      <stop offset="50%" stop-color="#ff6d00" />
      <stop offset="100%" stop-color="#ffea00" />
    </linearGradient>

    <linearGradient id="cyberNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a5f" />
      <stop offset="100%" stop-color="#7900ff" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bgGrad)" />

  <g filter="url(#shadow)">
    <polygon points="250,70 380,140 380,310 250,440 120,310 120,140" fill="#16171d" stroke="url(#cyberNeon)" stroke-width="4" stroke-linejoin="round" />

    <path d="M 160,140 C 130,70 80,90 60,130 C 90,170 130,170 150,165" fill="url(#cyberNeon)" />
    <path d="M 340,140 C 370,70 420,90 440,130 C 410,170 370,170 350,165" fill="url(#cyberNeon)" />

    <polygon points="170,210 220,230 200,245 160,225" fill="#ff1744" />
    <line x1="150" y1="210" x2="230" y2="245" stroke="#ff1744" stroke-width="2" opacity="0.5" />

    <polygon points="330,210 280,230 300,245 340,225" fill="#ff1744" />
    <line x1="350" y1="210" x2="270" y2="245" stroke="#ff1744" stroke-width="2" opacity="0.5" />

    <path d="M 220,260 L 250,290 L 280,260" fill="none" stroke="#717484" stroke-width="3" stroke-linecap="round" />

    <polygon points="190,320 250,300 310,320 250,350" fill="#0d0e12" stroke="#ff1744" stroke-width="2" />
    
    <path d="M 210,330 
             C 190,400 230,450 250,470 
             C 270,450 310,400 290,330 
             C 275,370 265,380 250,360 
             C 235,380 225,370 210,330 Z" 
          fill="url(#fireGrad)" />

    <line x1="140" y1="280" x2="180" y2="300" stroke="#717484" stroke-width="2" opacity="0.3" />
    <line x1="360" y1="280" x2="320" y2="300" stroke="#717484" stroke-width="2" opacity="0.3" />
    
    <circle cx="140" cy="280" r="3" fill="#ff2a5f" />
    <circle cx="360" cy="280" r="3" fill="#7900ff" />
  </g>
</svg>
